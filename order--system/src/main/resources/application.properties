# 应用名称
spring.application.name=order-system

# 服务器端口
server.port=8080

# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/order_system_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Thymeleaf配置
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 线程池配置
thread.pool.core-size=5
thread.pool.max-size=10
thread.pool.queue-capacity=100
