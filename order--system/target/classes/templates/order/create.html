<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建订单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group select:focus, .form-group input:focus {
            border-color: #11998e;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }
        .btn-back {
            background: #6c757d;
            color: white;
            margin-top: 10px;
            display: block;
            text-align: center;
            text-decoration: none;
            line-height: 50px;
        }
        .status-bar {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
        }
        .status-item {
            text-align: center;
        }
        .status-item .number {
            font-size: 2em;
            font-weight: bold;
            color: #11998e;
        }
        .status-item .label {
            color: #666;
            font-size: 14px;
        }
        .batch-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px dashed #e0e0e0;
        }
        .batch-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .info-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 5px 5px 0;
        }
        .info-box p {
            color: #2e7d32;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>创建订单</h1>
        <p class="subtitle">选择商品并提交订单，体验多线程并发处理</p>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="number" id="queueSize">0</div>
                <div class="label">队列中订单</div>
            </div>
            <div class="status-item">
                <div class="number" id="processedCount">0</div>
                <div class="label">已处理订单</div>
            </div>
            <div class="status-item">
                <div class="number" id="threadCount">3</div>
                <div class="label">消费者线程</div>
            </div>
        </div>
        
        <div class="info-box">
            <p>订单号生成规则：商品类型前2位 + 年月日时分秒 + 4位序号<br>
            例如：DZ202403151430250001（DZ表示电子类）</p>
        </div>
        
        <form id="orderForm">
            <div class="form-group">
                <label>选择商品</label>
                <select id="productId" name="productId" required>
                    <option value="">请选择商品</option>
                    <option th:each="p : ${products}" th:value="${p.id}" 
                            th:text="${p.productName} + ' - ¥' + ${p.price} + ' (库存:' + ${p.stock} + ')'">
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label>购买数量</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required>
            </div>
            
            <button type="submit" class="btn btn-submit">提交订单</button>
        </form>
        
        <div class="batch-section">
            <h3>批量测试（用于演示多线程并发）</h3>
            <div class="form-group">
                <label>批量生成订单数量</label>
                <input type="number" id="batchCount" min="1" max="50" value="10">
            </div>
            <button onclick="batchCreate()" class="btn btn-submit">批量生成订单</button>
        </div>
        
        <a href="/" class="btn btn-back">返回首页</a>
    </div>
    
    <script>
        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            
            const data = new URLSearchParams();
            data.append('productId', document.getElementById('productId').value);
            data.append('quantity', document.getElementById('quantity').value);
            
            fetch('/order/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: data
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    document.getElementById('orderForm').reset();
                    // 下单完成后跳转到首页
                    window.location.href = '/';
                }
            });
        };
        
        function batchCreate() {
            const productId = document.getElementById('productId').value;
            const quantity = document.getElementById('quantity').value || 1;
            const count = document.getElementById('batchCount').value;
            
            if (!productId) {
                alert('请先选择商品');
                return;
            }
            
            // 显示加载状态
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = '正在生成订单...';
            button.disabled = true;
            
            const data = new URLSearchParams();
            data.append('productId', productId);
            data.append('quantity', quantity);
            data.append('count', count);
            
            fetch('/order/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: data
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                // 批量下单完成后跳转到首页
                window.location.href = '/';
            })
            .catch(error => {
                alert('批量生成订单失败: ' + error.message);
                // 恢复按钮状态
                button.textContent = originalText;
                button.disabled = false;
            });
        }
        
        function updateStatus() {
            fetch('/order/status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('queueSize').textContent = data.queueSize;
                    document.getElementById('processedCount').textContent = data.processedCount;
                });
        }
        
        setInterval(updateStatus, 500);
        updateStatus();
    </script>
</body>
</html>
